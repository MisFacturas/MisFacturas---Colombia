<!-- Vista: Inactivar Cliente -->
<style>
  .result-item {
    padding: 10px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  .result-item:hover {
    background-color: #f0f0f0;
  }
  .selected-client {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    border-radius: 5px;
    margin-top: 20px;
  }
  .selected-client .remove-btn {
    cursor: pointer;
    color: red;
    font-weight: bold;
  }
  .result-box {
    margin-top: 30px;
  }
</style>

<!-- Header Nav -->
<div id="view-header-nav">
  <a onclick="goToClientes()" class="btn btn-dark btn-fluid">
    <i class="icon-left"></i>
    <span>Regresar</span>
  </a>
</div>

<!-- Title -->
<div id="view-title">
  <div class="col-12 text-center py-4"></div>
  <h2 class="text-center">Inactivar Cliente</h2>
</div>

<!-- Content -->
<div id="view-content">
  <div class="row py-3 px-5 mt-3 gx-0">
    <div class="col-12 py-4">
      <p>Selecciona un cliente de tu lista para inactivarlo, puedes activarlo cuando desees.</p>
    </div>

    <div class="col-12 px-0">
      <form class="row g-3" id="productFormInactivar" onsubmit="return false;">
        <div class="col-10">
          <label for="buscarClienteInactivar" class="form-label">Ingrese nombre, código o número identificación</label>
          <input type="text" class="form-control form-control-lg" id="buscarClienteInactivar" autocomplete="off" 
            onkeypress="if(event.key === 'Enter') { event.preventDefault(); buscarClientesInactivar(); }">
        </div>

        <div class="col-2 d-flex justify-content-center align-items-end">
          <a class="btn btn-primary" onclick="buscarClientesInactivar()">
            <i class="icon-24-outlined-action-main-search m-0"></i>
          </a>
        </div>
        
        <div class="col-12" id="clientesActivosContainerInactivar" style="display: none;">
          <label for="clientesActivosInactivar" class="form-label">Clientes Activos</label>
          <select id="clientesActivosInactivar" class="form-control form-control-lg" style="display: none;">
            <option value="">Seleccione un cliente</option>
          </select>
        </div>
        
        <div class="col-12" id="notificationInactivar" style="display: none; color: green; margin-top: 20px;">
        </div>
      </form>
    </div>

    <div class="col-12">
      <div class="result-box" id="resultBoxInactivar">
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div id="view-footer">
  <div class="col-6 pe-1">
    <a onclick="inactivarClienteAccion()" class="btn btn-primary btn-lg w-100 btn-menu d-flex">
      <span class="text-container pe-4">Inactivar</span>
    </a>
  </div>
  <div class="col-6 ps-1">
    <a onclick="goToMain()" class="btn btn-lg w-100 btn-outline-secondary mb-2">
      <span>Inicio</span>
      <i class="icon-24-outlined-other-location-home"></i>
    </a>
  </div>
</div>
