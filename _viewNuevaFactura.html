<!-- Vista: Nueva Factura -->
<!-- Header Nav -->
<div id="view-header-nav">
  <a onclick="goToFactura()" class="btn btn-dark btn-fluid">
    <i class="icon-left"></i>
    <span>Regresar</span>
  </a>
</div>

<!-- Title -->
<div id="view-title">
  <div class="col-12 text-center py-4"></div>
  <h2 class="text-center">Nueva Factura</h2>
</div>

<!-- Content -->
<div id="view-content">
  <div class="row py-3 px-4 gx-0">
    <div class="col-12 mt-4 px-0">
      <div class="row">
        <div class="col-6">
          <a onclick="limpiarFactura()" class="btn btn-secondary btn-lg w-100">
            <i class="icon-erase me-0"></i>
            <span>Limpiar <br>factura</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div id="view-footer">
  <div class="col-12 mt-4 px-0">
    <div class="row">
      <div class="col-6 mb-3">
        <a onclick="guardarFactura()" class="btn btn-primary btn-lg w-100 btn-menu d-flex">
          <span>Guardar factura</span>
        </a>
      </div>
      <div class="col-6">
        <a onclick="goToMain()" class="btn btn-lg w-100 btn-outline-secondary mb-2">
          <span>Inicio</span>
          <i class="icon-24-outlined-other-location-home"></i>
        </a>
      </div>
    </div>
  </div>
</div>
