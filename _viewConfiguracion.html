<!-- Vista: Configuración -->

<div id="view-header-nav">

    <i class="icon-left"></i>
    <span>Regresar</span>
  </a>
</div>

<!-- Title -->
<div id="view-title">
  <div class="col-12 text-center py-4"></div>

</div>

<div id="view-content">

    <div class="row justify-content-center">

<!-- Footer -->
