<!-- Vista: Instalación (SPA) -->
<!-- Header Nav -->
<div id="view-header-nav">
  <a onclick="goToMain()" class="btn btn-dark btn-fluid">
    <i class="icon-left"></i>
    <span>Regresar</span>
  </a>
</div>

<!-- Title -->
<div id="view-title">
  <div class="col-12 text-center py-4"></div>
  <h2 class="text-center">Instalación</h2>
</div>

<!-- Content -->
<div id="view-content">
  <div class="row py-3 px-4 gx-0">
    <div class="col-12 py-2">
      <p>Desde aquí puedes instalar o reinstalar las hojas requeridas. Esto evita popups del servidor y reduce el “En curso…”.</p>
    </div>

    <div class="col-12">
      <a onclick="instalarHojas()" class="btn btn-primary btn-lg w-100 mb-2">
        <span>Instalar / Reinstalar hojas</span>
      </a>
      <a onclick="verificarHojasFaltantes()" class="btn btn-outline-secondary btn-lg w-100">
        <span>Verificar hojas faltantes</span>
      </a>
    </div>

    <div class="col-12 mt-3">
      <div id="install-status" class="small text-muted"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<div id="view-footer">
  <div class="col-12 text-center">
    <a onclick="goToMain()" class="btn btn-outline-primary btn-lg w-100 d-flex align-items-center justify-content-center">
      <span>Inicio</span>
      <i class="icon-24-outlined-other-location-home ms-2"></i>
    </a>
  </div>
</div>
