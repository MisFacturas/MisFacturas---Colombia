<!-- Vista: Desvincular Cuenta -->
<!-- Header Nav -->
<div id="view-header-nav">
  <a onclick="goToConfiguracion()" class="btn btn-dark btn-fluid">
    <i class="icon-left"></i>
    <span>Regresar</span>
  </a>
</div>

<!-- Title -->
<div id="view-title">
  <div class="col-12 text-center py-4"></div>
  <h2 class="text-center">Desvincular Cuenta</h2>
</div>

<!-- Content -->
<div id="view-content">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6">
        <p class="fs-6 text-center">Si estás seguro de desvincular tu cuenta de misfacturas porfavor escribe la
          palabra <strong>"DESVINCULAR"</strong> en el campo a continuación y luego haz clic en el botón.</p>
      </div>
    </div>
    <!-- Campo de confirmación y botón de eliminación -->
    <div class="row justify-content-center mt-3">
      <div class="col-8 col-md-4 mb-3 text-center">
        <label for="confirmacionTexto" class="form-label">Confirma:</label>
        <input type="text" id="confirmacionTexto" class="form-control" placeholder="Escribe DESVINCULAR"
          oninput="toggleButtonDesvincular()">
      </div>
      <div class="col-8 col-md-4">
        <a id="botonEliminar"
          class="btn btn-secondary btn-lg w-100 btn-menu d-flex align-items-center justify-content-center"
          onclick="desvincularCuenta()" disabled="disabled">
          <span>Desvincular</span>
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div id="view-footer">
  <div class="col-12 text-center">
    <a onclick="goToMain()" class="btn btn-outline-primary btn-lg w-100 d-flex align-items-center justify-content-center">
      <span>Inicio</span>
      <i class="icon-24-outlined-other-location-home ms-2"></i>
    </a>
  </div>
</div>
