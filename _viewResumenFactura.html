<!-- Vista: Resumen de la Factura (SPA) -->
<!-- Header Nav -->
<div id="view-header-nav">
  <a onclick="goToNuevaFactura()" class="btn btn-dark btn-fluid">
    <i class="icon-left"></i>
    <span>Regresar</span>
  </a>
</div>

<!-- Title -->
<div id="view-title">
  <div class="col-12 text-center py-4"></div>
  <h2 class="text-center">Resumen de la Factura</h2>
</div>

<!-- Content -->
<div id="view-content">
  <div class="row py-3 px-4 gx-0">
    <div class="col-12">
      <div class="mb-2"><b>Nombre del Cliente:</b> <span id="rf-cliente"></span></div>
      <div class="mb-3"><b>Número de la Factura:</b> <span id="rf-numero"></span></div>

      <div class="mb-2"><b>Impuestos</b></div>
      <ul id="rf-impuestos" class="list-unstyled mb-3"></ul>

      <div class="mb-2"><b>Totales</b></div>
      <ul class="list-unstyled">
        <li class="d-flex justify-content-between py-1"><span>Subtotal:</span><span id="rf-subtotal"></span></li>
        <li class="d-flex justify-content-between py-1"><span>Impuestos Excluidos:</span><span id="rf-excl"></span></li>
        <li class="d-flex justify-content-between py-1"><span>Impuestos Incluidos:</span><span id="rf-incl"></span></li>
        <li class="d-flex justify-content-between py-1"><span>Retenciones:</span><span id="rf-retenciones"></span></li>
        <li class="d-flex justify-content-between py-1"><span>Descuentos:</span><span id="rf-desc"></span></li>
        <li class="d-flex justify-content-between py-1"><span>Cargos:</span><span id="rf-cargos"></span></li>
        <li class="d-flex justify-content-between py-1"><span>Pagos Anticipados:</span><span id="rf-anticipos"></span></li>
        <li class="d-flex justify-content-between py-1"><b>Total a Pagar:</b><b id="rf-total"></b></li>
      </ul>
    </div>
  </div>
</div>

<!-- Footer -->
<div id="view-footer">
  <div class="col-6 pe-1">
    <a onclick="editarFacturaDesdeResumen()" class="btn btn-outline-secondary btn-lg w-100">
      <span>Editar</span>
    </a>
  </div>
  <div class="col-6 ps-1">
    <a onclick="enviarFacturaDesdeResumen()" class="btn btn-primary btn-lg w-100">
      <span>Enviar</span>
    </a>
  </div>
</div>
